[package]
name = "ma-core"
version = "0.1.0"
edition = "2021"
description = "Core library for building ma-capable applications"
license = "MIT OR Apache-2.0"

[features]
default = ["kubo"]
kubo = []
iroh = ["dep:iroh"]

[dependencies]
anyhow = "1.0"
async-trait = "0.1"
base64 = "0.22"
did-ma = { package = "ma-did", path = "../did" }
iroh = { version = "0.97.0", optional = true }
rand = "0.8"
reqwest = { version = "0.12", default-features = false, features = ["json", "multipart"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2"
tokio = { version = "1.37", features = ["io-util"] }
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1.37", features = ["macros", "rt"] }
